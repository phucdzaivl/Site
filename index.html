<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Nhận Code Ugphone 4h Free ( By Phuc Ngo)🎁</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;background:linear-gradient(135deg,#6a11cb,#2575fc)}
.box{background:#fff;padding:35px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.25);width:340px}
button{width:220px;padding:14px;margin:10px;border:none;border-radius:30px;color:#fff;font-size:18px;cursor:pointer}
#getLink{background:#ff9800}#claim,#checkBtn,#copyBtn{background:#4CAF50}
button:disabled{background:#999}.hidden{display:none}
input{padding:10px;width:220px;border-radius:10px;border:1px solid #ccc;text-align:center}
</style>
</head>
<body>
<div class="box">
<h2>🎁 Nhận Code Ugphone 4h Free ( By Phuc Ngo)</h2>
<button id="getKey" onclick="getKey()">🔗 Get Key</button>
<button id="claim" onclick="claim()" enabled>🎉 Nhận Quà</button>
<p id="msg"></p>
<div id="claimBox" class="hidden">
<input id="giftCode" placeholder="Nhập mã"><br>
<button id="checkBtn" onclick="checkCode()">Xác nhận</button>
<p id="result"></p>
<div id="rewardBox" class="hidden">
<input id="rewardLink" readonly value="">
<button id="copyBtn" onclick="copyLink()">📋 Sao chép Link</button>
</div>
</div>
</div>
<script>
const CON_MAY=true;
const REWARDS = {
    "idknguhaha": "https://link1.com",
    "nguvailoz": "https://link2.com",
    "kk": "https://link3.com",
    "memaybeo": "https://link4.com",
    "nhincc": "https://link5.com"
};
function getLink(){
 document.getElementById("msg").innerHTML="✅ Lấy link thành công!";
 document.getElementById("claim").disabled=false;
 window.open("https://notevn.com/share/uv7azxu0","_blank");
}
function claim(){
 if(!CON_MAY){alert("❌ Đã hết máy! Vui lòng chờ Admin thêm máy.");return;}
 let last=localStorage.getItem("lastClaim");
 let today=new Date().toDateString();
 if(last===today){alert("Bạn đã nhận quà hôm nay rồi!");return;}
 document.getElementById("claimBox").classList.remove("hidden");
}
function checkCode(){

    let code = document.getElementById("giftCode").value.trim();

    if(REWARDS[code]){

        localStorage.setItem("lastClaim", new Date().toDateString());

        document.getElementById("result").style.color = "green";
        document.getElementById("result").innerHTML = "✅ Mã đúng!";

        // Hiện đúng link của mã đó
        document.getElementById("rewardLink").value = REWARDS[code];

        document.getElementById("rewardBox").classList.remove("hidden");

    }else{

        document.getElementById("result").style.color = "red";
        document.getElementById("result").innerHTML = "❌ Mã sai!";

        document.getElementById("rewardBox").classList.add("hidden");
    }
}
function copyLink(){
 const input=document.getElementById("rewardLink");
 navigator.clipboard.writeText(input.value);
 alert("Đã sao chép link!");
}
</script>
</body></html>
